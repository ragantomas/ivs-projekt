name: Generate Documentation

on:
  push:
    branches:
      - main

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Doxygen Action
        uses: mattnotmitt/doxygen-action@1.12.0
        with:
          doxyfile-path: 'src/Doxyfile'

      - name: Upload Documentation
        uses: actions/upload-artifact@v4
        with:
          name: manual
          path: .