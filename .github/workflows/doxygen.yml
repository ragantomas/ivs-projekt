name: Doxygen PDF generation

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Doxygen and LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz texlive-latex-base texlive-latex-recommended texlive-latex-extra texlive-fonts-recommended

      - name: Run Doxygen
        run: |
          cd src
          doxygen Doxyfile

      - name: Compile LaTeX to PDF
        run: |
          cd doxygen_output/latex
          make
          cp refman.pdf ../../manual.pdf

      - name: Commit and Push PDF
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add manual.pdf
          git commit -m "Update manual.pdf from src/Doxyfile" || echo "No changes to commit"
          git push